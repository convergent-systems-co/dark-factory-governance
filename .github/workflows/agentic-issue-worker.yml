name: Agentic Issue Worker

# CI-native issue-to-PR pipeline with governance gate.
#
# Picks issues labeled `agentic-ready`, claims them, assesses complexity,
# generates plans for complex issues, delegates implementation to the
# reusable agentic-loop.yml convergence loop, and creates PRs that
# automatically trigger dark-factory-governance.yml for panel review.
#
# Supports human feedback via `/agentic-retry: <feedback>` comments and
# self-dispatches to process queued `agentic-ready` issues.
#
# Part of Phase 5c (Always-On Orchestration).

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: string
      model:
        description: 'Model to use for the agentic loop'
        required: false
        type: string
        default: 'claude-opus-4-6'

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

concurrency:
  group: agentic-worker-${{ github.event.issue.number || github.event.inputs.issue_number || 'dispatch' }}
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------
  # Job 1: Select and claim the issue
  # -----------------------------------------------------------
  select-issue:
    name: select-issue
    runs-on: ubuntu-latest
    # Run when:
    #   - issues.labeled with `agentic-ready`
    #   - issue_comment matching `/agentic-retry:`
    #   - workflow_dispatch with issue_number
    if: >-
      (github.event_name == 'issues' && github.event.label.name == 'agentic-ready') ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/agentic-retry:')) ||
      (github.event_name == 'workflow_dispatch')
    outputs:
      issue_number: ${{ steps.resolve.outputs.issue_number }}
      issue_title: ${{ steps.fetch.outputs.issue_title }}
      issue_body: ${{ steps.fetch.outputs.issue_body }}
      branch_name: ${{ steps.branch.outputs.branch_name }}
      has_plan: ${{ steps.plan.outputs.has_plan }}
      plan_content: ${{ steps.plan.outputs.plan_content }}
      is_retry: ${{ steps.resolve.outputs.is_retry }}
      retry_feedback: ${{ steps.resolve.outputs.retry_feedback }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve issue number and trigger type
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          LABEL_NAME: ${{ github.event.label.name }}
          ISSUE_NUMBER_EVENT: ${{ github.event.issue.number }}
          ISSUE_NUMBER_INPUT: ${{ github.event.inputs.issue_number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          IS_RETRY="false"
          RETRY_FEEDBACK=""

          case "$EVENT_NAME" in
            issues)
              ISSUE_NUMBER="$ISSUE_NUMBER_EVENT"
              ;;
            issue_comment)
              ISSUE_NUMBER="$ISSUE_NUMBER_EVENT"
              IS_RETRY="true"
              # Extract feedback after `/agentic-retry:` prefix
              RETRY_FEEDBACK=$(echo "$COMMENT_BODY" | sed 's|^/agentic-retry:[[:space:]]*||')
              ;;
            workflow_dispatch)
              ISSUE_NUMBER="$ISSUE_NUMBER_INPUT"
              ;;
            *)
              echo "::error::Unexpected event: $EVENT_NAME"
              exit 1
              ;;
          esac

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "::error::Could not resolve issue number"
            exit 1
          fi

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "is_retry=$IS_RETRY" >> "$GITHUB_OUTPUT"

          # Write feedback to file to avoid shell escaping issues in GITHUB_OUTPUT
          echo "$RETRY_FEEDBACK" > /tmp/retry-feedback.txt
          {
            echo "retry_feedback<<FEEDBACK_EOF"
            cat /tmp/retry-feedback.txt
            echo "FEEDBACK_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Resolved issue #$ISSUE_NUMBER (retry=$IS_RETRY)"

      - name: Validate issue state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.resolve.outputs.issue_number }}
        run: |
          STATE=$(gh issue view "$ISSUE_NUMBER" --json state --jq '.state')
          if [ "$STATE" != "OPEN" ]; then
            echo "::error::Issue #$ISSUE_NUMBER is $STATE — aborting"
            exit 1
          fi

      - name: Fetch issue data
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.resolve.outputs.issue_number }}
        run: |
          ISSUE_JSON=$(gh api "repos/${{ github.repository }}/issues/$ISSUE_NUMBER")
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')

          # Write body to file to handle multiline safely
          echo "$ISSUE_JSON" | jq -r '.body // ""' > /tmp/issue-body.txt

          echo "issue_title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
          {
            echo "issue_body<<BODY_EOF"
            cat /tmp/issue-body.txt
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Claim issue — add agentic-in-progress, remove agentic-ready
        if: steps.resolve.outputs.is_retry != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.resolve.outputs.issue_number }}
        run: |
          # Add in-progress label
          gh issue edit "$ISSUE_NUMBER" --add-label "agentic-in-progress" 2>/dev/null || true

          # Remove ready label
          gh issue edit "$ISSUE_NUMBER" --remove-label "agentic-ready" 2>/dev/null || true

          echo "::notice::Claimed issue #$ISSUE_NUMBER"

      - name: Detect or create branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.resolve.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.fetch.outputs.issue_title }}
        run: |
          REPO="${{ github.repository }}"

          # Extract branch prefix from project.yaml (the part before the first /)
          BRANCH_PREFIX=$(grep 'branch_pattern:' project.yaml | sed 's/.*"\([^/]*\)\/.*/\1/' || echo "")
          if [ -z "$BRANCH_PREFIX" ] || [ "$BRANCH_PREFIX" = "{network_id}" ]; then
            BRANCH_PREFIX="$(whoami)"
          fi

          # Check for existing linked branch (convention: NETWORK_ID/*/ISSUE_NUMBER/*)
          EXISTING_BRANCH=$(gh api "repos/$REPO/branches" --paginate --jq '.[].name' 2>/dev/null \
            | grep -E "${BRANCH_PREFIX}/[^/]+/${ISSUE_NUMBER}/" | head -1 || true)

          if [ -n "$EXISTING_BRANCH" ]; then
            echo "branch_name=$EXISTING_BRANCH" >> "$GITHUB_OUTPUT"
            echo "::notice::Found existing branch: $EXISTING_BRANCH"
            exit 0
          fi

          # Check for branch linked via PR
          LINKED_PR=$(gh pr list --search "issue:$ISSUE_NUMBER" --json headRefName --jq '.[0].headRefName // empty' 2>/dev/null || true)
          if [ -n "$LINKED_PR" ]; then
            echo "branch_name=$LINKED_PR" >> "$GITHUB_OUTPUT"
            echo "::notice::Found branch via linked PR: $LINKED_PR"
            exit 0
          fi

          # Create slug from title
          SLUG=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//' \
            | cut -c1-50)

          BRANCH_NAME="${BRANCH_PREFIX}/feat/${ISSUE_NUMBER}/${SLUG}"

          # Create branch from main
          git fetch origin main
          git checkout -B "$BRANCH_NAME" origin/main
          git push -u origin "$BRANCH_NAME"

          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "::notice::Created branch: $BRANCH_NAME"

      - name: Check for existing plan
        id: plan
        env:
          ISSUE_NUMBER: ${{ steps.resolve.outputs.issue_number }}
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
        run: |
          # Check on the branch for plan files matching the issue number
          git fetch origin "$BRANCH_NAME" 2>/dev/null || true
          git checkout "origin/$BRANCH_NAME" -- . 2>/dev/null || true

          # Search for plan in both governance paths
          PLAN_FILE=""
          for dir in ".governance/plans" "governance/plans"; do
            for f in "$dir"/${ISSUE_NUMBER}-*.md "$dir"/*-${ISSUE_NUMBER}.md "$dir"/${ISSUE_NUMBER}.md; do
              if [ -f "$f" ]; then
                PLAN_FILE="$f"
                break 2
              fi
            done
          done

          if [ -n "$PLAN_FILE" ]; then
            echo "has_plan=true" >> "$GITHUB_OUTPUT"
            {
              echo "plan_content<<PLAN_EOF"
              cat "$PLAN_FILE"
              echo "PLAN_EOF"
            } >> "$GITHUB_OUTPUT"
            echo "::notice::Found existing plan: $PLAN_FILE"
          else
            echo "has_plan=false" >> "$GITHUB_OUTPUT"
            echo "plan_content=" >> "$GITHUB_OUTPUT"
            echo "::notice::No existing plan found for issue #$ISSUE_NUMBER"
          fi

  # -----------------------------------------------------------
  # Job 2: Assess issue complexity
  # -----------------------------------------------------------
  assess-complexity:
    name: assess-complexity
    runs-on: ubuntu-latest
    needs: select-issue
    # Skip if plan already exists or this is a retry
    if: needs.select-issue.outputs.has_plan != 'true' && needs.select-issue.outputs.is_retry != 'true'
    outputs:
      complexity: ${{ steps.classify.outputs.complexity }}
    steps:
      - name: Classify issue complexity
        id: classify
        env:
          ISSUE_BODY: ${{ needs.select-issue.outputs.issue_body }}
          ISSUE_TITLE: ${{ needs.select-issue.outputs.issue_title }}
        shell: python
        run: |
          import os

          body = os.environ.get("ISSUE_BODY", "")
          title = os.environ.get("ISSUE_TITLE", "")
          text = f"{title}\n{body}".lower()

          # Complexity indicators
          complex_keywords = [
              "migration", "refactor", "breaking change", "architecture",
              "security", "authentication", "authorization", "database",
              "schema", "api design", "multi-step", "cross-cutting",
              "infrastructure", "deployment", "pipeline", "compliance",
              "performance", "scalability", "backward compatibility",
          ]

          # Count signals
          body_length = len(body)
          keyword_hits = sum(1 for kw in complex_keywords if kw in text)
          checklist_items = body.count("- [ ]") + body.count("- [x]")
          section_headers = body.count("## ")

          # Decision logic
          is_complex = (
              body_length > 1500
              or keyword_hits >= 3
              or checklist_items >= 5
              or section_headers >= 4
          )

          complexity = "complex" if is_complex else "simple"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"complexity={complexity}\n")

          print(f"::notice::Complexity: {complexity} "
                f"(body_length={body_length}, keywords={keyword_hits}, "
                f"checklist={checklist_items}, sections={section_headers})")

  # -----------------------------------------------------------
  # Job 3: Create plan for complex issues
  # -----------------------------------------------------------
  create-plan:
    name: create-plan
    runs-on: ubuntu-latest
    needs: [select-issue, assess-complexity]
    # Only create plan for complex issues without existing plans
    if: >-
      needs.assess-complexity.outputs.complexity == 'complex' &&
      needs.select-issue.outputs.has_plan != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.select-issue.outputs.branch_name }}
          fetch-depth: 0

      - name: Generate plan
        env:
          ISSUE_NUMBER: ${{ needs.select-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.select-issue.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.select-issue.outputs.issue_body }}
          BRANCH_NAME: ${{ needs.select-issue.outputs.branch_name }}
        run: |
          PLAN_DIR=".governance/plans"
          mkdir -p "$PLAN_DIR"

          # Generate a slug from the issue title
          SLUG=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//' \
            | cut -c1-50)

          PLAN_FILE="${PLAN_DIR}/${ISSUE_NUMBER}-${SLUG}.md"

          # Extract requirements and acceptance criteria from issue body
          REQUIREMENTS=$(echo "$ISSUE_BODY" | sed -n '/^## Requirements/,/^## /p' | head -n -1 || echo "See issue body.")
          ACCEPTANCE=$(echo "$ISSUE_BODY" | sed -n '/^## Acceptance/,/^## /p' | head -n -1 || echo "See issue body.")

          cat > "$PLAN_FILE" << PLANEOF
          # $ISSUE_TITLE

          **Author:** agentic-issue-worker (CI)
          **Date:** $(date -u +%Y-%m-%d)
          **Status:** draft
          **Issue:** #${ISSUE_NUMBER}
          **Branch:** ${BRANCH_NAME}

          ---

          ## 1. Objective

          Implement the changes described in issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}.

          ## 2. Rationale

          This plan was auto-generated by the agentic-issue-worker because the issue was classified as complex. The agentic loop will use this plan as context for implementation.

          | Alternative | Considered | Rejected Because |
          |-------------|-----------|------------------|
          | Direct implementation (no plan) | Yes | Issue classified as complex; plan required by governance |

          ## 3. Scope

          ### Files to Create

          Determined by the agentic loop during implementation.

          ### Files to Modify

          Determined by the agentic loop during implementation.

          ### Files to Delete

          N/A — to be determined during implementation.

          ## 4. Approach

          1. Parse issue requirements and acceptance criteria
          2. Implement changes following project conventions
          3. Write or update tests as appropriate
          4. Update documentation
          5. Create PR with governance metadata

          ## 5. Testing Strategy

          | Test Type | Coverage | Description |
          |-----------|----------|-------------|
          | As needed | Per implementation | Determined by the agentic loop |

          ## 6. Risk Assessment

          | Risk | Likelihood | Impact | Mitigation |
          |------|-----------|--------|------------|
          | Complex issue may need multiple iterations | Medium | Medium | Agentic loop supports convergence with feedback |
          | Auto-generated plan may miss nuance | Medium | Low | Human can refine via /agentic-retry: feedback |

          ## 7. Dependencies

          See issue #${ISSUE_NUMBER} for dependency details.

          ## 8. Backward Compatibility

          To be evaluated during implementation. All changes must be additive per project conventions.

          ## 9. Governance

          | Panel | Required | Rationale |
          |-------|----------|-----------|
          | code-review | Yes | Default required |
          | security-review | Yes | Default required |
          | threat-modeling | Yes | Default required |
          | cost-analysis | Yes | Default required |
          | documentation-review | Yes | Default required |
          | data-governance-review | Yes | Default required |

          **Policy Profile:** default
          **Expected Risk Level:** medium

          ## 10. Decision Log

          | Date | Decision | Rationale |
          |------|----------|-----------|
          | $(date -u +%Y-%m-%d) | Auto-generated plan | Issue classified as complex by agentic-issue-worker |

          ---

          ## Issue Context

          ### Requirements

          ${REQUIREMENTS}

          ### Acceptance Criteria

          ${ACCEPTANCE}

          ### Full Issue Body

          ${ISSUE_BODY}
          PLANEOF

          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' "$PLAN_FILE"

          echo "::notice::Generated plan: $PLAN_FILE"
          echo "plan_file=$PLAN_FILE" >> "$GITHUB_ENV"

      - name: Commit and push plan
        env:
          BRANCH_NAME: ${{ needs.select-issue.outputs.branch_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .governance/plans/
          git commit -m "docs: auto-generate plan for issue #${{ needs.select-issue.outputs.issue_number }}" || {
            echo "::notice::No changes to commit (plan may already exist)"
            exit 0
          }
          git push origin "$BRANCH_NAME"

      - name: Post plan as issue comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.select-issue.outputs.issue_number }}
        run: |
          if [ -n "${plan_file:-}" ] && [ -f "$plan_file" ]; then
            COMMENT_BODY=$(cat <<'COMMENTEOF'
          **Agentic Issue Worker** — Plan generated

          This issue was classified as **complex**. A governance plan has been auto-generated and committed to the branch.

          <details>
          <summary>View plan</summary>

          COMMENTEOF
          )
            PLAN_CONTENT=$(cat "$plan_file")
            COMMENT_BODY="${COMMENT_BODY}

          ${PLAN_CONTENT}

          </details>

          The agentic loop will now begin implementation using this plan as context."

            echo "$COMMENT_BODY" > /tmp/plan-comment.md
            gh issue comment "$ISSUE_NUMBER" --body-file /tmp/plan-comment.md
          fi

  # -----------------------------------------------------------
  # Job 4: Run the agentic convergence loop
  # -----------------------------------------------------------
  run-agent:
    name: run-agent
    needs: [select-issue, assess-complexity, create-plan]
    # Always run after select-issue; assess-complexity and create-plan may be skipped
    if: >-
      always() &&
      needs.select-issue.result == 'success' &&
      (needs.assess-complexity.result == 'success' || needs.assess-complexity.result == 'skipped') &&
      (needs.create-plan.result == 'success' || needs.create-plan.result == 'skipped')
    uses: ./.github/workflows/agentic-loop.yml
    with:
      task_prompt: |
        You are the Coder persona from the Dark Factory governance platform.

        ## Issue #${{ needs.select-issue.outputs.issue_number }}: ${{ needs.select-issue.outputs.issue_title }}

        ${{ needs.select-issue.outputs.issue_body }}

        ## Plan Context

        ${{ needs.select-issue.outputs.plan_content }}

        ## Instructions

        1. Read the issue requirements carefully
        2. Implement the changes on branch `${{ needs.select-issue.outputs.branch_name }}`
        3. Follow conventional commits (`feat:`, `fix:`, `refactor:`, `docs:`)
        4. Update all affected documentation
        5. Ensure backward compatibility
        6. Reference issue #${{ needs.select-issue.outputs.issue_number }} in commits
      issue_number: ${{ needs.select-issue.outputs.issue_number }}
      branch_prefix: ${{ needs.select-issue.outputs.branch_name }}
      create_pr: true
      model: ${{ github.event.inputs.model || 'claude-opus-4-6' }}
      human_feedback: ${{ needs.select-issue.outputs.retry_feedback }}
    secrets: inherit

  # -----------------------------------------------------------
  # Job 5: Handle the agent result
  # -----------------------------------------------------------
  handle-result:
    name: handle-result
    runs-on: ubuntu-latest
    needs: [select-issue, run-agent]
    if: always() && needs.select-issue.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Post success comment
        if: needs.run-agent.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.select-issue.outputs.issue_number }}
          BRANCH_NAME: ${{ needs.select-issue.outputs.branch_name }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          cat > /tmp/success-comment.md <<EOF
          **Agentic Issue Worker** -- Implementation complete

          The agentic loop has completed successfully for this issue.

          - **Branch:** \`${BRANCH_NAME}\`
          - **Workflow run:** [${RUN_ID}](https://github.com/${REPO}/actions/runs/${RUN_ID})
          - **Next step:** A PR has been created (or updated) targeting \`main\`. The \`dark-factory-governance.yml\` workflow will automatically run panel reviews and the policy engine.

          If the PR needs changes after governance review, you can provide feedback with:
          \`\`\`
          /agentic-retry: <your feedback here>
          \`\`\`
          EOF

          sed -i 's/^          //' /tmp/success-comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/success-comment.md

      - name: Clean labels on success
        if: needs.run-agent.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.select-issue.outputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "agentic-in-progress" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --remove-label "agentic-feedback-needed" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --add-label "agentic-pr-open" 2>/dev/null || true

      - name: Post failure comment
        if: needs.run-agent.result == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.select-issue.outputs.issue_number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          cat > /tmp/failure-comment.md <<EOF
          **Agentic Issue Worker** -- Implementation failed

          The agentic loop did not complete successfully.

          - **Workflow run:** [${RUN_ID}](https://github.com/${REPO}/actions/runs/${RUN_ID})

          ### What to do

          1. Check the [workflow logs](https://github.com/${REPO}/actions/runs/${RUN_ID}) for details
          2. Provide guidance and retry:
             \`\`\`
             /agentic-retry: <describe what went wrong and how to fix it>
             \`\`\`
          3. Or re-label the issue with \`agentic-ready\` to start fresh
          EOF

          sed -i 's/^          //' /tmp/failure-comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/failure-comment.md

      - name: Add feedback-needed label on failure
        if: needs.run-agent.result == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.select-issue.outputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "agentic-in-progress" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --add-label "agentic-feedback-needed" 2>/dev/null || true

      - name: Self-dispatch to next agentic-ready issue
        if: needs.run-agent.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_ISSUE: ${{ needs.select-issue.outputs.issue_number }}
          MAX_CHAIN_DEPTH: '3'
        run: |
          # --- Chain depth guardrail ---
          # Count consecutive agentic-issue-worker runs in the last hour
          # to prevent unbounded self-dispatch chains.
          CHAIN_DEPTH=$(gh run list \
            --workflow=agentic-issue-worker.yml \
            --status=completed \
            --limit=10 \
            --json conclusion,createdAt,event \
            --jq '[.[] | select(.event == "workflow_dispatch" and .conclusion == "success")] | length' \
            2>/dev/null || echo "0")

          if [ "${CHAIN_DEPTH}" -ge "${MAX_CHAIN_DEPTH}" ]; then
            echo "::warning::Self-dispatch chain depth ${CHAIN_DEPTH} >= max ${MAX_CHAIN_DEPTH} — halting chain"
            echo "::notice::Remaining agentic-ready issues will be picked up by the next external trigger"
            exit 0
          fi

          # Find the next issue with agentic-ready label
          NEXT_ISSUE=$(gh issue list \
            --label "agentic-ready" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [ -n "$NEXT_ISSUE" ] && [ "$NEXT_ISSUE" != "$CURRENT_ISSUE" ]; then
            echo "::notice::Found next agentic-ready issue: #$NEXT_ISSUE — dispatching (chain depth: $((CHAIN_DEPTH + 1))/${MAX_CHAIN_DEPTH})"
            gh workflow run agentic-issue-worker.yml \
              --field issue_number="$NEXT_ISSUE" 2>/dev/null || {
                echo "::warning::Failed to self-dispatch for issue #$NEXT_ISSUE"
              }
          else
            echo "::notice::No more agentic-ready issues in queue"
          fi

  # -----------------------------------------------------------
  # Job 6: Handle retry with human feedback
  # -----------------------------------------------------------
  handle-retry:
    name: handle-retry
    needs: [select-issue]
    # Only run for retry triggers (is_retry == 'true')
    # The run-agent job handles the actual retry via human_feedback input
    if: needs.select-issue.outputs.is_retry == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Acknowledge retry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.select-issue.outputs.issue_number }}
          RETRY_FEEDBACK: ${{ needs.select-issue.outputs.retry_feedback }}
        run: |
          # Update labels
          gh issue edit "$ISSUE_NUMBER" --remove-label "agentic-feedback-needed" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --add-label "agentic-in-progress" 2>/dev/null || true

          cat > /tmp/retry-ack.md <<EOF
          **Agentic Issue Worker** -- Retry acknowledged

          Re-running the agentic loop with your feedback incorporated.

          > **Feedback received:** ${RETRY_FEEDBACK}

          The agent will use this guidance to address the issues from the previous run.
          EOF

          sed -i 's/^          //' /tmp/retry-ack.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/retry-ack.md

      - name: Dispatch agentic loop with feedback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.select-issue.outputs.issue_number }}
          BRANCH_NAME: ${{ needs.select-issue.outputs.branch_name }}
          ISSUE_TITLE: ${{ needs.select-issue.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.select-issue.outputs.issue_body }}
          PLAN_CONTENT: ${{ needs.select-issue.outputs.plan_content }}
          RETRY_FEEDBACK: ${{ needs.select-issue.outputs.retry_feedback }}
          MODEL: ${{ github.event.inputs.model || 'claude-opus-4-6' }}
        run: |
          # Re-dispatch this workflow via workflow_dispatch to trigger the
          # full pipeline (select-issue -> run-agent) with the feedback.
          # The retry_feedback is already captured in the issue comment;
          # the agentic-loop will pick it up via the human_feedback input.
          gh workflow run agentic-issue-worker.yml \
            --field issue_number="$ISSUE_NUMBER" \
            --field model="$MODEL" 2>/dev/null || {
              echo "::error::Failed to dispatch retry for issue #$ISSUE_NUMBER"
              exit 1
            }

          echo "::notice::Dispatched retry for issue #$ISSUE_NUMBER with feedback"
