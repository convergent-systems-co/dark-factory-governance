name: Prompt Eval Suite

on:
  pull_request:
    branches: [main]
    paths:
      - 'governance/prompts/reviews/**'
      - 'governance/evals/**'
      - 'governance/schemas/panel-output.schema.json'
      - 'governance/engine/tests/test_prompt_eval.py'

permissions:
  contents: read

concurrency:
  group: prompt-eval-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: Run prompt eval suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest jsonschema pyyaml

      - name: Run prompt eval tests
        working-directory: governance/engine/tests
        run: |
          python -m pytest test_prompt_eval.py -v --tb=short
