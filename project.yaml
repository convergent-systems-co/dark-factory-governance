# Project AI Configuration — ai-submodule (governance platform)

name: "ai-submodule"
language: "python"
framework: null

governance:
  policy_profile: "default"
  parallel_coders: 6
  use_project_manager: false        # opt-in: set to true to enable PM-multiplexed pipeline
  parallel_code_managers: 3         # max concurrent Code Managers when PM is enabled (default 3)

conventions:
  git:
    branch_pattern: "{network_id}/{type}/{number}/{name}"
    commit_style: "conventional"
    pr_template: true
